<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Malaika Tariq — Full-Stack Developer</title>
  <desc id="desc">An animated professional blue profile card with smoothly changing colors.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1200" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#081A33">
        <animate attributeName="stop-color" values="#081A33;#123C69;#1D4ED8;#0B2A4A;#081A33" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0.5" stop-color="#123C69">
        <animate attributeName="stop-color" values="#123C69;#2563EB;#60A5FA;#1E40AF;#123C69" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#60A5FA">
        <animate attributeName="stop-color" values="#60A5FA;#1D4ED8;#123C69;#93C5FD;#60A5FA" dur="10s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <radialGradient id="glow">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#020617" flood-opacity="0.42"/>
    </filter>

    <clipPath id="cardClip">
      <rect width="1200" height="260" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#cardClip)">
    <rect width="1200" height="260" fill="url(#background)"/>

    <circle cx="120" cy="35" r="190" fill="url(#glow)" opacity="0.45">
      <animate attributeName="cx" values="120;430;120" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="35;95;35" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1080" cy="220" r="230" fill="url(#glow)" opacity="0.34">
      <animate attributeName="cx" values="1080;790;1080" dur="11s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="220;150;220" dur="11s" repeatCount="indefinite"/>
    </circle>

    <path d="M-60 202C170 122 352 258 610 188C824 130 990 134 1260 55V290H-60V202Z" fill="#020617" fill-opacity="0.18">
      <animate attributeName="d" values="M-60 202C170 122 352 258 610 188C824 130 990 134 1260 55V290H-60V202Z;M-60 174C190 246 380 121 625 192C865 262 1012 112 1260 104V290H-60V174Z;M-60 202C170 122 352 258 610 188C824 130 990 134 1260 55V290H-60V202Z" dur="8s" repeatCount="indefinite"/>
    </path>

    <rect x="-320" y="0" width="240" height="260" fill="url(#shine)" transform="skewX(-18)">
      <animate attributeName="x" values="-320;1450" dur="5.5s" repeatCount="indefinite"/>
    </rect>

    <g opacity="0.5">
      <circle cx="75" cy="58" r="3" fill="#DBEAFE"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.2s" repeatCount="indefinite"/></circle>
      <circle cx="1105" cy="57" r="4" fill="#DBEAFE"><animate attributeName="opacity" values="1;0.2;1" dur="2.8s" repeatCount="indefinite"/></circle>
      <circle cx="1060" cy="185" r="3" fill="#FFFFFF"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite"/></circle>
    </g>
  </g>

  <rect x="1.5" y="1.5" width="1197" height="257" rx="26.5" stroke="#BFDBFE" stroke-opacity="0.55" stroke-width="3"/>

  <g filter="url(#shadow)" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif">
    <text x="600" y="112" fill="#FFFFFF" font-size="58" font-weight="750" letter-spacing="1.5">Malaika Tariq</text>
    <text x="600" y="157" fill="#E6F2FF" font-size="20" font-weight="600" letter-spacing="5">FULL-STACK DEVELOPER</text>
    <text x="600" y="194" fill="#DBEAFE" font-size="15" font-weight="500" letter-spacing="2.8">BUILDING RESPONSIVE • USEFUL • HUMAN-CENTERED WEB EXPERIENCES</text>
  </g>

  <g transform="translate(535 220)">
    <rect width="130" height="4" rx="2" fill="#FFFFFF" fill-opacity="0.2"/>
    <rect width="42" height="4" rx="2" fill="#FFFFFF">
      <animate attributeName="x" values="0;88;0" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.55;1;0.55" dur="3s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
